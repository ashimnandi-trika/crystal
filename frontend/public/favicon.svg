    <path d="M -16 -4 L 0 -20 L 16 -4 L 0 22 Z" fill="url(#crystal-g)" stroke="#3b82f6" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Top facet lines -->
    <path d="M -16 -4 L 0 -4 L 16 -4" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.9"/>
    <path d="M -8 -12 L 0 -4 L 8 -12" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.9"/>
    <!-- Side bevels -->
    <path d="M -16 -4 L 0 22" fill="none" stroke="#1e3a8a" stroke-width="0.8" opacity="0.6"/>
    <path d="M 16 -4 L 0 22" fill="none" stroke="#1e3a8a" stroke-width="0.8" opacity="0.6"/>
    <!-- Sheen -->
    <path d="M -12 -6 L -2 -16 L 0 -4 Z" fill="url(#crystal-sheen)"/>
